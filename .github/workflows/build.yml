name: build-and-push

on:
  push:
    branches: [main]
    # Version tags (v0.8.0, ...) build the same way a branch push does; the tag-name image tag
    # comes from the ref_name logic below, so a release gets a pullable :vX.Y.Z image.
    tags: ["v*"]
  workflow_dispatch: {}

# Workflow-level default is deliberately minimal -- only the build job actually pushes to GHCR,
# so only it gets the extra packages: write grant, via its own per-job permissions block below
# (security_hardening_plan.md finding #15). Every other job (test, and any future lint/scan job)
# inherits just this, not packages: write it doesn't need.
permissions:
  contents: read

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app/ tests/

      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-report=json

      - name: Publish coverage summary
        if: always() && hashFiles('coverage.json') != ''
        run: |
          PCT=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "### Coverage: ${PCT}%" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: test
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # arm64 alongside amd64 -- a large share of the homelab audience runs on Raspberry
      # Pi-class boxes, and an amd64-only image simply won't start there. QEMU emulates the
      # arm64 build stage; slower builds are the accepted cost.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TAGS=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "TAGS=${{ env.IMAGE_NAME }}:${{ github.ref_name }},${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
