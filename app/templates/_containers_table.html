{% if containers %}
<table class="containers-table">
  <thead>
    <tr>
      <th>Container</th>
      <th>Image</th>
      <th>Tag</th>
      <th>Last checked</th>
    </tr>
  </thead>
  <tbody>
    {% for c in containers %}
    <tr>
      <td class="mono">{{ c.container_name }}</td>
      <td class="mono">{{ c.image_repo }}</td>
      <td class="mono">{{ c.tag }}</td>
      <td>{{ c.last_checked_at[:16].replace('T', ' ') if c.last_checked_at else '—' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="empty">No containers tracked yet.</p>
{% endif %}
