<div class="feature-header">
  <h1>
    {%- if feature == "updates" -%}Updates
    {%- elif feature == "logs" -%}Log health
    {%- elif feature == "compose" -%}Compose health
    {%- endif -%}
    {%- if updates_count is defined %} <span class="heading-count" id="updates-count-badge">({{ updates_count }})</span>{% endif -%}
  </h1>
  <div class="topbar-right">
    <div id="check-status">{% include "_status.html" %}</div>
    {% if feature == "updates" %}
    <form method="post" action="/updates/reset-and-recheck"
          onsubmit="return confirm('This wipes all Update history and tracking state, then re-checks everything fresh. Continue?')">
      <button type="submit" class="button-danger" title="Wipe all tracked-container and update history, then run a fresh check">
        Reset &amp; re-check
      </button>
    </form>
    {% endif %}
    <button hx-post="/{{ feature }}/check-now" hx-target="#check-status" hx-swap="innerHTML" hx-disabled-elt="this">
      Check now
    </button>
  </div>
</div>
