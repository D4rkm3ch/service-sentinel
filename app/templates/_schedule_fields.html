{% macro schedule_fields(scope, spec, save_url, disabled) %}
<form class="schedule-fields" data-scope="{{ scope }}" hx-post="{{ save_url }}" hx-trigger="change"
      hx-target="#saved-{{ scope }}-sched" hx-swap="innerHTML">
  <select name="{{ scope }}_mode" class="schedule-mode-select" onchange="updateScheduleVisibility('{{ scope }}')" {{ 'disabled' if disabled else '' }}>
    <option value="hourly" {{ 'selected' if spec.mode == 'hourly' else '' }}>Hourly</option>
    <option value="daily" {{ 'selected' if spec.mode == 'daily' or not spec.mode else '' }}>Daily</option>
    <option value="weekly" {{ 'selected' if spec.mode == 'weekly' else '' }}>Weekly</option>
    <option value="monthly" {{ 'selected' if spec.mode == 'monthly' else '' }}>Monthly</option>
  </select>

  <div class="schedule-mode-field" data-mode="hourly">
    <label>Every
      <input type="number" name="{{ scope }}_interval_hours" min="1" max="23"
             value="{{ spec.get('interval_hours', 4) }}" style="width:60px" {{ 'disabled' if disabled else '' }}>
      hour(s), starting at
      <select name="{{ scope }}_start_hour" {{ 'disabled' if disabled else '' }}>
        {% for h in range(24) %}
        <option value="{{ h }}" {{ 'selected' if spec.get('start_hour', 0) == h else '' }}>{{ '%02d:00'|format(h) }}</option>
        {% endfor %}
      </select>
    </label>
  </div>

  <div class="schedule-mode-field" data-mode="daily">
    <label>at <input type="time" name="{{ scope }}_time"
                        value="{{ '%02d:%02d'|format(spec.get('hour', 6), spec.get('minute', 0)) }}" {{ 'disabled' if disabled else '' }}></label>
  </div>

  <div class="schedule-mode-field" data-mode="weekly">
    <span class="schedule-weekday-group">
      {% for d, label in [('mon','Mon'),('tue','Tue'),('wed','Wed'),('thu','Thu'),('fri','Fri'),('sat','Sat'),('sun','Sun')] %}
      <label class="schedule-weekday-option">
        <input type="checkbox" name="{{ scope }}_days_of_week" value="{{ d }}"
               {{ 'checked' if d in spec.get('days_of_week', ['mon']) else '' }} {{ 'disabled' if disabled else '' }}>
        {{ label }}
      </label>
      {% endfor %}
    </span>
    <span class="schedule-field-separator">|</span>
    <label>at <input type="time" name="{{ scope }}_time"
                        value="{{ '%02d:%02d'|format(spec.get('hour', 6), spec.get('minute', 0)) }}" {{ 'disabled' if disabled else '' }}></label>
  </div>

  <div class="schedule-mode-field" data-mode="monthly">
    <label>Day
      <select name="{{ scope }}_day_of_month" {{ 'disabled' if disabled else '' }}>
        {% for d in range(1, 32) %}
        <option value="{{ d }}" {{ 'selected' if spec.get('day_of_month', 1) == d else '' }}>{{ d }}</option>
        {% endfor %}
      </select>
    </label>
    <label>at <input type="time" name="{{ scope }}_time"
                        value="{{ '%02d:%02d'|format(spec.get('hour', 6), spec.get('minute', 0)) }}" {{ 'disabled' if disabled else '' }}></label>
  </div>

  <span class="saved-indicator-slot" id="saved-{{ scope }}-sched"></span>
</form>
{% endmacro %}
