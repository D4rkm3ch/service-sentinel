{% macro severity_buttons(scope, current, save_url, disabled) %}
<span class="severity-group-row">
  <div class="severity-group" data-scope="{{ scope }}">
    {% for s in ['suggestion', 'warning', 'critical'] %}
    <input type="radio" id="{{ scope }}_sev_{{ s }}" name="severity" value="{{ s }}"
           {{ 'checked' if current == s else '' }} {{ 'disabled' if disabled else '' }}
           hx-post="{{ save_url }}" hx-trigger="change" hx-target="#saved-{{ scope }}-sev" hx-swap="innerHTML">
    <label for="{{ scope }}_sev_{{ s }}" class="severity-btn severity-btn-{{ s }}">{{ severity_label(scope, s) }}</label>
    {% endfor %}
  </div>
  <span class="saved-indicator-slot" id="saved-{{ scope }}-sev"></span>
</span>
{% endmacro %}
