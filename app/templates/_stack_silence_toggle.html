<span id="stack-silence-toggle-btn">
{% if silence_state == 'silenced' %}
<button type="button" class="button-silence" hx-post="/logs/stack/unsilence?stack_id={{ stack_id|urlencode }}" hx-target="#stack-silence-toggle-btn" hx-swap="outerHTML">
  Unsilence
</button>
{% else %}
<button type="button" class="button-silence" hx-post="/logs/stack/silence?stack_id={{ stack_id|urlencode }}" hx-target="#stack-silence-toggle-btn" hx-swap="outerHTML">
  Silence
</button>
{% endif %}
</span>
<span id="stack-silence-status-badge" hx-swap-oob="true">
{% if silence_state == 'silenced' %}
<span class="badge badge-lg badge-silenced">Silenced</span>
{% elif silence_state == 'partially_silenced' %}
<span class="badge badge-lg badge-partially-silenced">Partially Silenced</span>
{% endif %}
</span>
