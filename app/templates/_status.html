<div id="check-status-inner">
{% if state.running %}
  <div class="status-badge status-running">
    <span class="spinner" aria-hidden="true"></span> Checking…
  </div>
{% else %}
  <div class="status-badge status-idle">
    {{ status_summary_text }}
  </div>
{% endif %}
</div>
{% if state.running %}
<span class="status-poller" hx-get="/{{ feature }}/status-poll" hx-trigger="load delay:2s" hx-target="this" hx-swap="outerHTML"></span>
{% endif %}
