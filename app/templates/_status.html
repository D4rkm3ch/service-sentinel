{% if state.running %}
<div class="status-badge status-running"
     hx-get="/{{ feature }}/status" hx-trigger="load delay:1.5s" hx-target="this" hx-swap="outerHTML">
  <span class="spinner" aria-hidden="true"></span> Checking…
</div>
{% else %}
<div class="status-badge status-idle">
  {{ status_summary_text }}
</div>
{% endif %}
