{% if state.running %}
<span id="check-status-text" hx-swap-oob="true">{{ progress_text }}</span>
{% else %}
<div id="check-status-inner" hx-swap-oob="true">
  <div class="status-badge status-idle" id="check-status-text">
    {{ status_summary_text }}
  </div>
</div>
{% endif %}
<span class="status-poller"
      hx-get="/{{ feature }}/status-poll?prev_running={{ 'true' if state.running else 'false' }}"
      hx-trigger="load delay:{{ poll_delay_ms if state.running else idle_poll_delay_ms }}ms"
      hx-target="this" hx-swap="outerHTML"></span>
