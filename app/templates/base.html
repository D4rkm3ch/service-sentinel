<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Release Radar{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.12/htmx.min.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">release-radar</a>
    <div class="topbar-right">
      <div id="check-status">{% include "_status.html" %}</div>
      <button hx-post="/check-now" hx-target="#check-status" hx-swap="innerHTML" hx-disabled-elt="this">
        Check now
      </button>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
