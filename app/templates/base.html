<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Service Sentinel{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo-black.svg">
  <link rel="stylesheet" href="/static/style.css?v={{ static_asset_version }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.12/htmx.min.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand"><img src="/static/logo-white.svg" alt="" class="brand-logo">Service Sentinel</a>
    <nav class="tabs">
      <a href="/" class="{{ 'active' if active_tab == 'overview' else '' }}">Overview</a>
      <a href="/updates" class="{{ 'active' if active_tab == 'updates' else '' }}">Updates</a>
      <a href="/logs" class="{{ 'active' if active_tab == 'logs' else '' }}">Logs</a>
      <a href="/compose" class="{{ 'active' if active_tab == 'compose' else '' }}">Compose</a>
      <a href="/settings" class="{{ 'active' if active_tab == 'settings' else '' }}">Settings</a>
    </nav>
  </header>
  <main>
    <div id="check-running-banner" class="check-running-banner" style="display:none">
      <span class="status-badge status-running">
        <span class="spinner" aria-hidden="true"></span>
        <span id="check-running-banner-text">Checking…</span>
      </span>
      <button type="button" id="check-running-banner-cancel" class="button-danger check-running-banner-cancel">Cancel</button>
    </div>
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    Service Sentinel v{{ app_version }}
    · <a href="{{ github_url }}" target="_blank" rel="noopener">GitHub</a>
    · {{ app_timezone() }}
    · uptime {{ get_uptime_str() }}
  </footer>
  <script>
    // Dims every Check now / Regenerate / Reset & re-check button sitewide (class
    // "{feature}-action-btn" for feature in updates/logs/compose) while ANY feature's check --
    // a full check, a scheduled firing, or a single scoped per-item recheck at any level, all
    // claim that feature's own mutex -- is running ANYWHERE, not just within the same feature.
    // Three independent per-feature mutexes exist server-side (so, say, a Logs check and a
    // Compose check can genuinely run concurrently without blocking each other), but the UI
    // treats them as one combined lock: kicking off a Logs Reset & re-check must disable the
    // Updates page's buttons just as much as Logs' own, since running two checks' worth of
    // background work at once is never something a click should be able to trigger by accident.
    //
    // The sitewide top banner (#check-running-banner, markup right after the topbar above) is
    // the single place progress + Cancel live now -- on every page, not just the three main
    // ones -- driven by the same poll this disabling logic uses (GET /checks/status once a
    // second). Check Now buttons themselves no longer turn into Cancel buttons and sub-pages no
    // longer grow an inline "a check is running elsewhere" blurb next to their own buttons; both
    // of those were replaced by the banner being visible everywhere instead.
    //
    // Disabling is also triggered instantly on htmx:beforeRequest for any of these buttons,
    // not just left to the once-a-second poll -- the POST that kicks off a scoped/full check
    // returns almost immediately (the actual work runs in a background thread), so waiting for
    // the next poll tick to notice "running" meant a visible ~0.5-1s lag, sometimes preceded by
    // a flicker back to enabled the moment that fast POST's own response landed (buttons don't
    // carry hx-disabled-elt for exactly this reason -- it only covers the POST round-trip, not
    // the background work it kicks off). beforeRequest fires only once htmx has actually
    // decided to send the request (i.e. after any hx-confirm dialog was accepted), so a
    // cancelled confirm never disables anything. The poll remains the source of truth for
    // re-enabling once every running check genuinely finishes.
    (function () {
      var FEATURES = ["updates", "logs", "compose"];
      var ALL_SELECTOR = FEATURES.map(function (f) { return "." + f + "-action-btn"; }).join(",");

      var banner = document.getElementById("check-running-banner");
      var bannerText = document.getElementById("check-running-banner-text");
      var bannerCancelBtn = document.getElementById("check-running-banner-cancel");

      function applyRunningState(running) {
        document.querySelectorAll(ALL_SELECTOR).forEach(function (el) { el.disabled = running; });
      }

      // Set the instant a click on the banner's own Cancel button fires, so the banner reads
      // "Cancelling…" immediately rather than waiting up to 1s for the next poll to notice
      // check_state.is_cancel_requested() server-side (data.cancelling below) -- cleared once
      // the poll confirms the check has actually stopped. A page navigated to mid-cancel loses
      // this local flag, but picks the same state right back up from data.cancelling itself,
      // which check_state.py keeps set server-side until the check (or the next one) clears it.
      var cancelRequestedLocally = false;

      function updateBanner(data) {
        if (!banner) return;
        if (!data.running) {
          banner.style.display = "none";
          cancelRequestedLocally = false;
          if (bannerCancelBtn) bannerCancelBtn.disabled = false;
          return;
        }
        banner.style.display = "";
        var cancelling = data.cancelling || cancelRequestedLocally;
        if (bannerText) bannerText.textContent = cancelling ? "Cancelling…" : (data.progress_text || "Checking…");
        if (bannerCancelBtn) bannerCancelBtn.disabled = cancelling;
      }

      if (bannerCancelBtn) {
        bannerCancelBtn.addEventListener("click", function () {
          cancelRequestedLocally = true;
          bannerCancelBtn.disabled = true;
          if (bannerText) bannerText.textContent = "Cancelling…";
          fetch("/checks/cancel", { method: "POST" });
        });
      }

      document.body.addEventListener("htmx:beforeRequest", function (evt) {
        var cl = evt.target.classList;
        if (cl && FEATURES.some(function (f) { return cl.contains(f + "-action-btn"); })) {
          applyRunningState(true);
        }
      });

      // The main Updates/Logs/Compose page's own #check-status badge runs its own independent
      // perpetual self-poll (see _status.html/_status_poll.html) at a cadence that starts at
      // idle_poll_delay_ms (3000ms) and only switches to the fast cadence once IT notices
      // something running, on its own schedule -- so on the tick where a check starts or
      // finishes, that badge can lag behind this poll (which already runs every 1s and is what
      // disables/re-enables buttons instantly and drives the sitewide banner). Nudging its own
      // poller element the moment this faster poll notices EITHER transition closes that gap
      // everywhere, not just here -- both directions matter: starting, and finishing (a real-
      // world report: buttons/spinner reset the instant this poll notices running -> false, but
      // the Issues/Updates table below only refreshes once the badge's OWN poll fires the
      // checkComplete HX-Trigger -- see _render_status_poll's docstring -- so without this nudge
      // the table could sit stale for a few seconds after the check visibly looked done). Edge-
      // triggered (only on an actual transition, not every tick) so it can't stack a second
      // overlapping poll chain on top of the badge's own once that's already caught up.
      var wasAnyRunning = false;
      function nudgeMainBadge() {
        var poller = document.querySelector("#check-status .status-poller");
        if (!poller) return;
        var url = poller.getAttribute("hx-get");
        if (!url) return;
        htmx.ajax("GET", url, { target: poller, swap: poller.getAttribute("hx-swap") || "outerHTML" });
      }

      function poll() {
        fetch("/checks/status").then(function (r) { return r.json(); }).catch(function () {
          return { running: false, feature: null, progress_text: "", cancelling: false };
        }).then(function (data) {
          applyRunningState(data.running);
          updateBanner(data);
          if (data.running !== wasAnyRunning) nudgeMainBadge();
          wasAnyRunning = data.running;
        });
      }

      poll();
      setInterval(poll, 1000);
    })();

    // Collapsible top table (Updates/Issues) on the Updates/Logs/Compose main pages -- clicking
    // anywhere on the feature-header row (but not its Check now/Regenerate/Reset buttons, see
    // .topbar-right in the CSS) slides the table below it open or shut. Animates via max-height
    // rather than display:none so it's a real slide, not an instant snap; the height is
    // measured fresh on every toggle (not hardcoded) so it keeps working as rows are added,
    // removed, or swapped in by the table's own 20s htmx poll. Snapping back to max-height:none
    // once fully open (rather than leaving it pinned at the measured px value) means a later
    // poll-driven content change while expanded doesn't get clipped or need a re-measure.
    //
    (function () {
      document.body.addEventListener("click", function (evt) {
        var header = evt.target.closest(".collapsible-header");
        if (!header || evt.target.closest(".topbar-right")) return;

        var body = document.getElementById(header.getAttribute("data-collapse-target"));
        if (!body) return;

        if (header.classList.contains("collapsed")) {
          header.classList.remove("collapsed");
          body.style.maxHeight = body.scrollHeight + "px";
          body.addEventListener("transitionend", function onEnd(e) {
            if (e.propertyName !== "max-height") return;
            body.style.maxHeight = "none";
            body.removeEventListener("transitionend", onEnd);
          });
        } else {
          body.style.maxHeight = body.scrollHeight + "px";
          body.offsetHeight; // force reflow so the next line animates from this height, not 0
          header.classList.add("collapsed");
          body.style.maxHeight = "0px";
        }
      });
    })();
  </script>
</body>
</html>
