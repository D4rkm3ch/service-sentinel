<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Release Radar{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.12/htmx.min.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">release-radar</a>
    <nav class="tabs">
      <a href="/" class="{{ 'active' if active_tab == 'overview' else '' }}">Overview</a>
      <a href="/updates" class="{{ 'active' if active_tab == 'updates' else '' }}">Updates</a>
      <a href="/logs" class="{{ 'active' if active_tab == 'logs' else '' }}">Logs</a>
      <a href="/compose" class="{{ 'active' if active_tab == 'compose' else '' }}">Compose</a>
      <a href="/settings" class="{{ 'active' if active_tab == 'settings' else '' }}">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    release-radar v{{ app_version }}
    · <a href="{{ github_url }}" target="_blank" rel="noopener">GitHub</a>
    · {{ app_timezone() }}
    · uptime {{ get_uptime_str() }}
  </footer>
</body>
</html>
