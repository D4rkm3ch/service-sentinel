<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Release Radar{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ static_asset_version }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.12/htmx.min.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">release-radar</a>
    <nav class="tabs">
      <a href="/" class="{{ 'active' if active_tab == 'overview' else '' }}">Overview</a>
      <a href="/updates" class="{{ 'active' if active_tab == 'updates' else '' }}">Updates</a>
      <a href="/logs" class="{{ 'active' if active_tab == 'logs' else '' }}">Logs</a>
      <a href="/compose" class="{{ 'active' if active_tab == 'compose' else '' }}">Compose</a>
      <a href="/settings" class="{{ 'active' if active_tab == 'settings' else '' }}">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    release-radar v{{ app_version }}
    · <a href="{{ github_url }}" target="_blank" rel="noopener">GitHub</a>
    · {{ app_timezone() }}
    · uptime {{ get_uptime_str() }}
  </footer>
  <script>
    // Dims every Check now / Regenerate / Reset & re-check button sitewide (class
    // "{feature}-action-btn" for feature in updates/logs/compose) while ANY feature's check --
    // a full check, a scheduled firing, or a single scoped per-item recheck at any level, all
    // claim that feature's own mutex -- is running ANYWHERE, not just within the same feature.
    // Three independent per-feature mutexes exist server-side (so, say, a Logs check and a
    // Compose check can genuinely run concurrently without blocking each other), but the UI
    // treats them as one combined lock: kicking off a Logs Reset & re-check must disable the
    // Updates page's buttons just as much as Logs' own, since running two checks' worth of
    // background work at once is never something a click should be able to trigger by accident.
    // Polls three tiny shared endpoints rather than hooking into any one page's own status
    // display, since Stack/Service/Finding pages don't render that at all. A no-op (never
    // starts polling) on a page with no such buttons at all, e.g. Settings.
    //
    // Disabling is also triggered instantly on htmx:beforeRequest for any of these buttons,
    // not just left to the once-a-second poll -- the POST that kicks off a scoped/full check
    // returns almost immediately (the actual work runs in a background thread), so waiting for
    // the next poll tick to notice "running" meant a visible ~0.5-1s lag, sometimes preceded by
    // a flicker back to enabled the moment that fast POST's own response landed (buttons don't
    // carry hx-disabled-elt for exactly this reason -- it only covers the POST round-trip, not
    // the background work it kicks off). beforeRequest fires only once htmx has actually
    // decided to send the request (i.e. after any hx-confirm dialog was accepted), so a
    // cancelled confirm never disables anything. The poll remains the source of truth for
    // re-enabling once every running check genuinely finishes.
    (function () {
      var FEATURES = ["updates", "logs", "compose"];
      var ALL_SELECTOR = FEATURES.map(function (f) { return "." + f + "-action-btn"; }).join(",");
      if (!document.querySelector(ALL_SELECTOR)) return;

      function applyRunningState(running) {
        document.querySelectorAll(ALL_SELECTOR).forEach(function (el) { el.disabled = running; });
      }

      document.body.addEventListener("htmx:beforeRequest", function (evt) {
        var cl = evt.target.classList;
        if (cl && FEATURES.some(function (f) { return cl.contains(f + "-action-btn"); })) {
          applyRunningState(true);
        }
      });

      function poll() {
        Promise.all(FEATURES.map(function (feature) {
          return fetch("/" + feature + "/running-state").then(function (r) { return r.json(); }).catch(function () { return { running: false }; });
        })).then(function (results) {
          applyRunningState(results.some(function (r) { return r.running; }));
        });
      }

      poll();
      setInterval(poll, 1000);
    })();

    // Collapsible top table (Updates/Issues) on the Updates/Logs/Compose main pages -- clicking
    // anywhere on the feature-header row (but not its Check now/Regenerate/Reset buttons, see
    // .topbar-right in the CSS) slides the table below it open or shut. Animates via max-height
    // rather than display:none so it's a real slide, not an instant snap; the height is
    // measured fresh on every toggle (not hardcoded) so it keeps working as rows are added,
    // removed, or swapped in by the table's own 20s htmx poll. Snapping back to max-height:none
    // once fully open (rather than leaving it pinned at the measured px value) means a later
    // poll-driven content change while expanded doesn't get clipped or need a re-measure.
    (function () {
      document.body.addEventListener("click", function (evt) {
        var header = evt.target.closest(".collapsible-header");
        if (!header || evt.target.closest(".topbar-right")) return;

        var body = document.getElementById(header.getAttribute("data-collapse-target"));
        if (!body) return;

        if (header.classList.contains("collapsed")) {
          header.classList.remove("collapsed");
          body.style.maxHeight = body.scrollHeight + "px";
          body.addEventListener("transitionend", function onEnd(e) {
            if (e.propertyName !== "max-height") return;
            body.style.maxHeight = "none";
            body.removeEventListener("transitionend", onEnd);
          });
        } else {
          body.style.maxHeight = body.scrollHeight + "px";
          body.offsetHeight; // force reflow so the next line animates from this height, not 0
          header.classList.add("collapsed");
          body.style.maxHeight = "0px";
        }
      });
    })();
  </script>
</body>
</html>
