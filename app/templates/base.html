<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="nordic" data-sidebar="collapsed">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Service Sentinel{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo-black.svg">
  <!-- Stamps the real theme + accent + sidebar state onto <html> (from localStorage, if this
       browser has ever picked any of them) before the stylesheet below is even requested --
       data-theme="dark"/data-accent="nordic"/data-sidebar="collapsed" above are only the no-JS/
       first-ever-visit fallback (and Nordic Blue really is the app's actual default, not just a
       placeholder). Blocking and inline on purpose: an externally-sourced script, or one placed
       after the stylesheet, would let one frame paint in the wrong state first -- a visible
       flash every single page load rather than a one-time cost. The sidebar's own state used to
       be restored by a separate, non-blocking script further down (see the sidebar collapse/
       expand IIFE below) -- harmless for the theme/accent (both painted correctly from the
       hardcoded HTML attribute until JS ran), but a real-world report: an operator who'd
       expanded the sidebar would see it snap collapsed-then-expanded on every full page
       navigation, since <body data-sidebar="collapsed"> painted first every time. Restoring it
       here instead, at the same point theme/accent already are, closes that gap the same way. -->
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("service-sentinel-theme");
        if (savedTheme === "light" || savedTheme === "dark") document.documentElement.dataset.theme = savedTheme;
        var savedAccent = localStorage.getItem("service-sentinel-accent");
        if (savedAccent) document.documentElement.dataset.accent = savedAccent;
        var savedSidebar = localStorage.getItem("service-sentinel-sidebar");
        if (savedSidebar === "expanded" || savedSidebar === "collapsed") document.documentElement.dataset.sidebar = savedSidebar;
      } catch (e) { /* localStorage unavailable (private browsing, etc.) -- stay on the defaults */ }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v={{ static_asset_version }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.12/htmx.min.js"></script>
</head>
<body data-tab="{{ active_tab }}">
  <!-- Icon sprite: every icon used anywhere in the chrome below is a <use href="#icon-*">
       against one of these -- one definition per icon regardless of how many places reference
       it, all inheriting color/size from .icon (style.css) via currentColor rather than each
       needing its own fill/stroke. Hidden (not display:none, which some browsers also hide
       <use> references against) so it renders nothing on its own. -->
  <svg style="position:absolute; width:0; height:0; overflow:hidden" aria-hidden="true">
    <defs>
      <symbol id="icon-menu" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </symbol>
      <symbol id="icon-home" viewBox="0 0 24 24">
        <path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-9"/>
      </symbol>
      <symbol id="icon-updates" viewBox="0 0 24 24">
        <path d="M20 11A8 8 0 0 0 6.3 6.3L4 8.6"/><path d="M4 4v4.6h4.6"/>
        <path d="M4 13a8 8 0 0 0 13.7 4.7L20 15.4"/><path d="M20 20v-4.6h-4.6"/>
      </symbol>
      <symbol id="icon-logs" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3"/><line x1="12" y1="15" x2="17" y2="15"/>
      </symbol>
      <symbol id="icon-compose" viewBox="0 0 24 24">
        <path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="M3 12l9 5 9-5"/><path d="M3 16l9 5 9-5"/>
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2"/>
        <line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2"/>
        <line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="18" r="2"/>
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4" y1="12" x2="2" y2="12"/><line x1="22" y1="12" x2="20" y2="12"/>
        <line x1="4.9" y1="4.9" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.1" y2="19.1"/>
        <line x1="4.9" y1="19.1" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.1" y2="4.9"/>
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4 7 7 0 0 0 20 14.5Z"/>
      </symbol>
    </defs>
  </svg>

  <header class="topbar">
    <div class="topbar-start">
      <button type="button" id="sidebar-toggle" class="icon-button sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <svg class="icon"><use href="#icon-menu"/></svg>
      </button>
      <a href="/" class="brand">
        <img src="/static/logo-white.svg" alt="" class="brand-logo brand-logo-dark">
        <img src="/static/logo-black.svg" alt="" class="brand-logo brand-logo-light">
        Service Sentinel
      </a>
    </div>
    <div class="topbar-center">
      <div id="check-running-banner" class="topbar-status" style="display:none">
        <span class="status-badge status-running">
          <span class="spinner" aria-hidden="true"></span>
          <span id="check-running-banner-text">Checking…</span>
        </span>
        <button type="button" id="check-running-banner-cancel" class="button-danger topbar-status-cancel">Cancel</button>
      </div>
      <!-- Idle counterpart to the banner above -- a compact combined health summary shown
           whenever nothing is running, so this region isn't just blank at rest. The two are
           mutually exclusive (see updateBanner in the script below): starting a check hides
           this and shows the banner, finishing a check hides the banner and brings this back. -->
      <div id="topbar-idle-summary" class="topbar-status" style="display:none">
        <span class="status-badge">
          <span id="topbar-idle-summary-dot" class="status-dot"></span>
          <span id="topbar-idle-summary-text"></span>
        </span>
      </div>
    </div>
    <div class="topbar-end">
      <button type="button" id="check-all-btn" class="check-all-btn">Check All</button>
      <!-- All seven carry data-accent -- picking any of them switches the app's --accent family
           and persists it (see style.css's own [data-theme][data-accent] blocks and the script
           below). Graphite Grey is the accessibility-motivated one -- a genuinely neutral
           palette (no color at all, not just a low-saturation tint), for full/severe color
           vision deficiency or anyone who wants zero color dependency. -->
      <div class="accent-picker">
        <button type="button" id="accent-swatch-btn" class="icon-button accent-swatch-btn"
                aria-haspopup="true" aria-expanded="false" title="Accent color">
          <span class="accent-swatch-dot accent-dot-nordic" aria-hidden="true"></span>
          <span id="accent-swatch-label">Nordic Blue</span>
        </button>
        <div id="accent-picker-menu" class="accent-picker-menu hidden" role="menu">
          <button type="button" class="accent-picker-option active" role="menuitemradio" aria-checked="true"
                  data-swatch="accent-dot-nordic" data-label="Nordic Blue" data-accent="nordic">
            <span class="accent-swatch-dot accent-dot-nordic" aria-hidden="true"></span> Nordic Blue
          </button>
          <button type="button" class="accent-picker-option" role="menuitemradio" aria-checked="false"
                  data-swatch="accent-dot-emerald" data-label="Emerald Green" data-accent="emerald">
            <span class="accent-swatch-dot accent-dot-emerald" aria-hidden="true"></span> Emerald Green
          </button>
          <button type="button" class="accent-picker-option" role="menuitemradio" aria-checked="false"
                  data-swatch="accent-dot-amber" data-label="Sunset Amber" data-accent="amber">
            <span class="accent-swatch-dot accent-dot-amber" aria-hidden="true"></span> Sunset Amber
          </button>
          <button type="button" class="accent-picker-option" role="menuitemradio" aria-checked="false"
                  data-swatch="accent-dot-violet" data-label="Royal Violet" data-accent="violet">
            <span class="accent-swatch-dot accent-dot-violet" aria-hidden="true"></span> Royal Violet
          </button>
          <button type="button" class="accent-picker-option" role="menuitemradio" aria-checked="false"
                  data-swatch="accent-dot-crimson" data-label="Crimson Red" data-accent="crimson">
            <span class="accent-swatch-dot accent-dot-crimson" aria-hidden="true"></span> Crimson Red
          </button>
          <button type="button" class="accent-picker-option" role="menuitemradio" aria-checked="false"
                  data-swatch="accent-dot-teal" data-label="Ocean Teal" data-accent="teal">
            <span class="accent-swatch-dot accent-dot-teal" aria-hidden="true"></span> Ocean Teal
          </button>
          <button type="button" class="accent-picker-option" role="menuitemradio" aria-checked="false"
                  data-swatch="accent-dot-graphite" data-label="Graphite Grey" data-accent="graphite">
            <span class="accent-swatch-dot accent-dot-graphite" aria-hidden="true"></span> Graphite Grey
          </button>
        </div>
      </div>
      <button type="button" id="theme-toggle-btn" class="icon-button theme-toggle-btn" aria-label="Switch color theme" title="Switch color theme">
        <svg class="icon icon-sun"><use href="#icon-sun"/></svg>
        <svg class="icon icon-moon"><use href="#icon-moon"/></svg>
      </button>
    </div>
  </header>

  <nav id="sidebar" class="sidebar" aria-label="Main navigation">
    <div class="sidebar-watermark" aria-hidden="true"></div>
    <a href="/" class="sidebar-link {{ 'active' if active_tab == 'overview' else '' }}">
      <svg class="icon"><use href="#icon-home"/></svg><span class="sidebar-label">Overview</span>
    </a>
    <a href="/updates" class="sidebar-link {{ 'active' if active_tab == 'updates' else '' }}">
      <svg class="icon"><use href="#icon-updates"/></svg><span class="sidebar-label">Updates</span>
    </a>
    <a href="/logs" class="sidebar-link {{ 'active' if active_tab == 'logs' else '' }}">
      <svg class="icon"><use href="#icon-logs"/></svg><span class="sidebar-label">Runtime</span>
    </a>
    <a href="/compose" class="sidebar-link {{ 'active' if active_tab == 'compose' else '' }}">
      <svg class="icon"><use href="#icon-compose"/></svg><span class="sidebar-label">Configuration</span>
    </a>
    <a href="/settings" class="sidebar-link {{ 'active' if active_tab == 'settings' else '' }}">
      <svg class="icon"><use href="#icon-settings"/></svg><span class="sidebar-label">Settings</span>
    </a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    Service Sentinel v{{ app_version }}
    · <a href="{{ github_url }}" target="_blank" rel="noopener">GitHub</a>
    · {{ app_timezone() }}
    · uptime {{ get_uptime_str() }}
  </footer>
  <script>
    // Dims every Check now / Regenerate / Reset & re-check button sitewide (class
    // "{feature}-action-btn" for feature in updates/logs/compose) while ANY feature's check --
    // a full check, a scheduled firing, or a single scoped per-item recheck at any level, all
    // claim that feature's own mutex -- is running ANYWHERE, not just within the same feature.
    // Three independent per-feature mutexes exist server-side (so, say, a Logs check and a
    // Compose check can genuinely run concurrently without blocking each other), but the UI
    // treats them as one combined lock: kicking off a Logs Reset & re-check must disable the
    // Updates page's buttons just as much as Logs' own, since running two checks' worth of
    // background work at once is never something a click should be able to trigger by accident.
    //
    // The sitewide top banner (#check-running-banner, markup right after the topbar above) is
    // the single place progress + Cancel live now -- on every page, not just the three main
    // ones -- driven by the same poll this disabling logic uses (GET /checks/status once a
    // second). Check Now buttons themselves no longer turn into Cancel buttons and sub-pages no
    // longer grow an inline "a check is running elsewhere" blurb next to their own buttons; both
    // of those were replaced by the banner being visible everywhere instead.
    //
    // Disabling is also triggered instantly on htmx:beforeRequest for any of these buttons,
    // not just left to the once-a-second poll -- the POST that kicks off a scoped/full check
    // returns almost immediately (the actual work runs in a background thread), so waiting for
    // the next poll tick to notice "running" meant a visible ~0.5-1s lag, sometimes preceded by
    // a flicker back to enabled the moment that fast POST's own response landed (buttons don't
    // carry hx-disabled-elt for exactly this reason -- it only covers the POST round-trip, not
    // the background work it kicks off). beforeRequest fires only once htmx has actually
    // decided to send the request (i.e. after any hx-confirm dialog was accepted), so a
    // cancelled confirm never disables anything. The poll remains the source of truth for
    // re-enabling once every running check genuinely finishes.
    (function () {
      var FEATURES = ["updates", "logs", "compose"];
      // #check-all-btn is included here (not just the three "{feature}-action-btn" classes) so
      // it dims and re-enables on exactly the same signal as every other check-starting button
      // -- it kicks off the same per-feature mutexes underneath (see scheduler.run_check_all),
      // just chained, so there's no separate state to track for it.
      var ALL_SELECTOR = FEATURES.map(function (f) { return "." + f + "-action-btn"; }).join(",") + ",#check-all-btn";

      var banner = document.getElementById("check-running-banner");
      var bannerText = document.getElementById("check-running-banner-text");
      var bannerCancelBtn = document.getElementById("check-running-banner-cancel");
      var idleSummary = document.getElementById("topbar-idle-summary");
      var idleSummaryDot = document.getElementById("topbar-idle-summary-dot");
      var idleSummaryText = document.getElementById("topbar-idle-summary-text");

      function applyRunningState(running) {
        document.querySelectorAll(ALL_SELECTOR).forEach(function (el) { el.disabled = running; });
      }

      // Set the instant a click on the banner's own Cancel button fires, so the banner reads
      // "Cancelling…" immediately rather than waiting up to 1s for the next poll to notice
      // check_state.is_cancel_requested() server-side (data.cancelling below) -- cleared once
      // the poll confirms the check has actually stopped. A page navigated to mid-cancel loses
      // this local flag, but picks the same state right back up from data.cancelling itself,
      // which check_state.py keeps set server-side until the check (or the next one) clears it.
      var cancelRequestedLocally = false;

      function updateIdleSummary(data) {
        if (!idleSummary) return;
        if (idleSummaryText) idleSummaryText.textContent = data.summary_text || "";
        if (idleSummaryDot) idleSummaryDot.className = "status-dot status-dot-" + (data.summary_status || "idle");
      }

      function updateBanner(data) {
        if (!banner) return;
        if (!data.running) {
          banner.style.display = "none";
          cancelRequestedLocally = false;
          if (bannerCancelBtn) bannerCancelBtn.disabled = false;
          updateIdleSummary(data);
          if (idleSummary) idleSummary.style.display = "";
          return;
        }
        if (idleSummary) idleSummary.style.display = "none";
        banner.style.display = "";
        var cancelling = data.cancelling || cancelRequestedLocally;
        if (bannerText) bannerText.textContent = cancelling ? "Cancelling…" : (data.progress_text || "Checking…");
        if (bannerCancelBtn) bannerCancelBtn.disabled = cancelling;
      }

      if (bannerCancelBtn) {
        bannerCancelBtn.addEventListener("click", function () {
          cancelRequestedLocally = true;
          bannerCancelBtn.disabled = true;
          if (bannerText) bannerText.textContent = "Cancelling…";
          fetch("/checks/cancel", { method: "POST" });
        });
      }

      // "Check All" -- Updates, then Logs, then Compose's existing full checks, chained
      // server-side (see scheduler.run_check_all / POST /checks/check-all). Disabled the
      // instant it's clicked, same optimistic reasoning as the beforeRequest listener below
      // (this button isn't an htmx element, so that listener never sees it) -- the poll then
      // takes over as source of truth for re-enabling once the whole chain finishes.
      var checkAllBtn = document.getElementById("check-all-btn");
      if (checkAllBtn) {
        checkAllBtn.addEventListener("click", function () {
          applyRunningState(true);
          fetch("/checks/check-all", { method: "POST" });
        });
      }

      document.body.addEventListener("htmx:beforeRequest", function (evt) {
        var cl = evt.target.classList;
        if (cl && FEATURES.some(function (f) { return cl.contains(f + "-action-btn"); })) {
          applyRunningState(true);
        }
      });

      // The main Updates/Logs/Compose page's own #check-status badge runs its own independent
      // perpetual self-poll (see _status.html/_status_poll.html) at a cadence that starts at
      // idle_poll_delay_ms (3000ms) and only switches to the fast cadence once IT notices
      // something running, on its own schedule -- so on the tick where a check starts or
      // finishes, that badge can lag behind this poll (which already runs every 1s and is what
      // disables/re-enables buttons instantly and drives the sitewide banner). Nudging its own
      // poller element the moment this faster poll notices EITHER transition closes that gap
      // everywhere, not just here -- both directions matter: starting, and finishing (a real-
      // world report: buttons/spinner reset the instant this poll notices running -> false, but
      // the Issues/Updates table below only refreshes once the badge's OWN poll fires the
      // checkComplete HX-Trigger -- see _render_status_poll's docstring -- so without this nudge
      // the table could sit stale for a few seconds after the check visibly looked done). Edge-
      // triggered (only on an actual transition, not every tick) so it can't stack a second
      // overlapping poll chain on top of the badge's own once that's already caught up.
      var wasAnyRunning = false;
      function nudgeMainBadge() {
        var poller = document.querySelector("#check-status .status-poller");
        if (!poller) return;
        var url = poller.getAttribute("hx-get");
        if (!url) return;
        htmx.ajax("GET", url, { target: poller, swap: poller.getAttribute("hx-swap") || "outerHTML" });
      }

      function poll() {
        fetch("/checks/status").then(function (r) { return r.json(); }).catch(function () {
          return { running: false, feature: null, progress_text: "", cancelling: false, summary_text: "", summary_status: "idle" };
        }).then(function (data) {
          applyRunningState(data.running);
          updateBanner(data);
          if (data.running !== wasAnyRunning) nudgeMainBadge();
          wasAnyRunning = data.running;
        });
      }

      poll();
      setInterval(poll, 1000);
    })();

    // Sidebar collapse/expand -- the initial state is already restored by the head's blocking
    // script (same localStorage key, same before-first-paint treatment as theme/accent -- see
    // that script's own comment for why this moved there). This IIFE only wires up the click
    // handler and keeps the button's aria-expanded in sync.
    (function () {
      var STORAGE_KEY = "service-sentinel-sidebar";
      var toggleBtn = document.getElementById("sidebar-toggle");
      if (!toggleBtn) return;

      function titleFor(state) {
        return state === "expanded" ? "Collapse" : "Expand";
      }

      function apply(state) {
        document.documentElement.dataset.sidebar = state;
        toggleBtn.setAttribute("aria-expanded", state === "expanded" ? "true" : "false");
        toggleBtn.setAttribute("title", titleFor(state));
      }

      toggleBtn.setAttribute("aria-expanded", document.documentElement.dataset.sidebar === "expanded" ? "true" : "false");
      toggleBtn.setAttribute("title", titleFor(document.documentElement.dataset.sidebar));

      toggleBtn.addEventListener("click", function () {
        var next = document.documentElement.dataset.sidebar === "expanded" ? "collapsed" : "expanded";
        apply(next);
        try { localStorage.setItem(STORAGE_KEY, next); } catch (e) { /* private browsing, etc. */ }
      });
    })();

    // Sidebar hover-peek -- while collapsed, hovering the rail (its icons are effectively the
    // whole visible rail at that width) briefly slides it open exactly as if the hamburger had
    // been clicked, purely as a temporary visual overlay (see .sidebar-peeking in style.css for
    // why this never reflows the rest of the page the way the real pinned/expanded state does).
    // A short delay before opening avoids it firing on every incidental mouse pass-through;
    // closing has no delay at all -- moving the mouse away collapses it back immediately. Only
    // active while collapsed: an already-pinned-open sidebar has nothing to peek into, and a
    // pending peek is cancelled the moment an explicit click pins it open first.
    (function () {
      var PEEK_DELAY_MS = 400;
      var sidebar = document.getElementById("sidebar");
      var toggleBtn = document.getElementById("sidebar-toggle");
      if (!sidebar || !toggleBtn) return;

      var peekTimer = null;

      function cancelPeek() {
        if (peekTimer) {
          window.clearTimeout(peekTimer);
          peekTimer = null;
        }
        sidebar.classList.remove("sidebar-peeking");
      }

      sidebar.addEventListener("mouseenter", function () {
        if (document.documentElement.dataset.sidebar !== "collapsed") return;
        peekTimer = window.setTimeout(function () {
          sidebar.classList.add("sidebar-peeking");
        }, PEEK_DELAY_MS);
      });

      sidebar.addEventListener("mouseleave", cancelPeek);
      toggleBtn.addEventListener("click", cancelPeek);
    })();

    // Light/dark theme toggle -- the actual switch on click; the matching read happens in the
    // blocking <head> script above (same localStorage key), which is what avoids a flash of the
    // wrong theme on every subsequent page load once a preference has been saved once.
    (function () {
      var STORAGE_KEY = "service-sentinel-theme";
      var toggleBtn = document.getElementById("theme-toggle-btn");
      if (!toggleBtn) return;

      toggleBtn.addEventListener("click", function () {
        var next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
        document.documentElement.dataset.theme = next;
        try { localStorage.setItem(STORAGE_KEY, next); } catch (e) { /* private browsing, etc. */ }
      });
    })();

    // Accent color picker. Every option carries a data-accent attribute (see the markup above),
    // and picking one sets document.documentElement.dataset.accent (which style.css's
    // [data-theme][data-accent] blocks key off of) and persists it, same localStorage-backed
    // pattern as the light/dark toggle.
    (function () {
      var STORAGE_KEY = "service-sentinel-accent";
      var wrapper = document.querySelector(".accent-picker");
      var toggleBtn = document.getElementById("accent-swatch-btn");
      var menu = document.getElementById("accent-picker-menu");
      var swatchDot = toggleBtn ? toggleBtn.querySelector(".accent-swatch-dot") : null;
      var swatchLabel = document.getElementById("accent-swatch-label");
      if (!wrapper || !toggleBtn || !menu) return;

      function close() {
        menu.classList.add("hidden");
        toggleBtn.setAttribute("aria-expanded", "false");
      }

      function selectOption(option) {
        menu.querySelectorAll(".accent-picker-option").forEach(function (o) {
          o.classList.remove("active");
          o.setAttribute("aria-checked", "false");
        });
        option.classList.add("active");
        option.setAttribute("aria-checked", "true");
        if (swatchDot) swatchDot.className = "accent-swatch-dot " + option.dataset.swatch;
        if (swatchLabel) swatchLabel.textContent = option.dataset.label;
      }

      // Re-sync the picker's own displayed state to whatever data-accent the head script
      // already applied (from localStorage) -- without this, a returning visitor who'd picked
      // Emerald Green would see the *color* correctly (the head script handles that before
      // paint) but the picker itself would still show Nordic Blue as checked until clicked.
      var currentAccent = document.documentElement.dataset.accent;
      if (currentAccent) {
        var currentOption = menu.querySelector('.accent-picker-option[data-accent="' + currentAccent + '"]');
        if (currentOption) selectOption(currentOption);
      }

      toggleBtn.addEventListener("click", function (evt) {
        evt.stopPropagation();
        menu.classList.toggle("hidden");
        var open = !menu.classList.contains("hidden");
        toggleBtn.setAttribute("aria-expanded", open ? "true" : "false");
      });

      menu.querySelectorAll(".accent-picker-option").forEach(function (option) {
        option.addEventListener("click", function () {
          selectOption(option);
          if (option.dataset.accent) {
            document.documentElement.dataset.accent = option.dataset.accent;
            try { localStorage.setItem(STORAGE_KEY, option.dataset.accent); } catch (e) { /* private browsing, etc. */ }
          }
          close();
        });
      });

      document.addEventListener("click", function (evt) {
        if (!wrapper.contains(evt.target)) close();
      });
      document.addEventListener("keydown", function (evt) {
        if (evt.key === "Escape") close();
      });
    })();

    // Collapsible top table (Updates/Issues) on the Updates/Logs/Compose main pages -- clicking
    // anywhere on the feature-header row (but not its Check now/Regenerate/Reset buttons, see
    // .topbar-right in the CSS) slides the table below it open or shut. Animates via max-height
    // rather than display:none so it's a real slide, not an instant snap; the height is
    // measured fresh on every toggle (not hardcoded) so it keeps working as rows are added,
    // removed, or swapped in by the table's own 20s htmx poll. Snapping back to max-height:none
    // once fully open (rather than leaving it pinned at the measured px value) means a later
    // poll-driven content change while expanded doesn't get clipped or need a re-measure.
    //
    (function () {
      document.body.addEventListener("click", function (evt) {
        var header = evt.target.closest(".collapsible-header");
        if (!header || evt.target.closest(".topbar-right")) return;

        var body = document.getElementById(header.getAttribute("data-collapse-target"));
        if (!body) return;

        if (header.classList.contains("collapsed")) {
          header.classList.remove("collapsed");
          // Clip only for the duration of this grow animation -- see .collapse-body's own
          // comment on why it sits at overflow:visible the rest of the time (a sticky <th>
          // glitch after an htmx-driven content swap).
          body.style.overflow = "hidden";
          body.style.maxHeight = body.scrollHeight + "px";
          body.addEventListener("transitionend", function onEnd(e) {
            if (e.propertyName !== "max-height") return;
            body.style.maxHeight = "none";
            body.style.overflow = "visible";
            body.removeEventListener("transitionend", onEnd);
          });
        } else {
          body.style.overflow = "hidden";
          body.style.maxHeight = body.scrollHeight + "px";
          body.offsetHeight; // force reflow so the next line animates from this height, not 0
          header.classList.add("collapsed");
          body.style.maxHeight = "0px";
        }
      });
    })();
  </script>
</body>
</html>
