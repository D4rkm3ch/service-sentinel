{% extends "base.html" %}
{% block title %}Dashboard — release-radar{% endblock %}
{% block content %}

<section>
  <h1>Updates</h1>
  <div id="updates-table" hx-get="/partials/updates" hx-trigger="every 20s, checkComplete from:body" hx-swap="innerHTML">
    {% include "_updates_table.html" %}
  </div>
</section>

<section>
  <h2>Tracked containers</h2>
  <div id="containers-table" hx-get="/partials/containers" hx-trigger="every 20s, checkComplete from:body" hx-swap="innerHTML">
    {% include "_containers_table.html" %}
  </div>
</section>

{% endblock %}
