services:
  service-sentinel:
    image: ghcr.io/d4rkm3ch/service-sentinel:latest
    container_name: service-sentinel
    restart: unless-stopped
    # The app itself only ever writes to /data (its own SQLite database) -- confirmed by reading
    # every file-write call site in app/. read_only locks the rest of the container's filesystem
    # (including its own source under /app) at the kernel level: even a fully compromised app
    # process couldn't rewrite its own code, plant a persistence file, or touch anything outside
    # the two writable paths declared below.
    read_only: true
    tmpfs:
      # Harmless if unused today (the app has no temp-file/upload code path) -- kept as standard
      # defense-in-depth since libraries in the dependency chain may assume /tmp is writable.
      # Ephemeral by design: wiped on every restart, never a place anything persists.
      - /tmp
    ports:
      - "8420:8000"
    environment:
      # AI provider, API key, model, and the GitHub token are all configured from the Settings
      # page in the UI, not here -- see the "AI Provider" panel. Switching providers or updating
      # a key takes effect immediately, no redeploy needed.
      - COMPOSE_ROOT=/compose
      - DATA_DIR=/data
      - TZ=${TZ:-Australia/Sydney}
      - PUBLIC_URL=${PUBLIC_URL}
      - REGISTRY_CHECK_CONCURRENCY=${REGISTRY_CHECK_CONCURRENCY:-10}
      - LOG_MAX_LINES_PER_CONTAINER=${LOG_MAX_LINES_PER_CONTAINER:-5000}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      # The app only ever calls list/inspect operations against the Docker API (confirmed by
      # reading every call site in app/docker_client.py) -- that's the actual reason socket
      # access is safe, not the :ro flag below. :ro only stops this container from replacing or
      # deleting the socket special file itself; it does nothing to restrict which Docker Engine
      # API calls get accepted once a client is connected to it, so a future code change, a
      # compromised dependency, or a bug that constructs the wrong SDK call could still issue a
      # destructive command over this same socket without :ro stopping it. If you want a real
      # enforcement boundary instead of a code-review one, put a Docker socket proxy that
      # allowlists specific API endpoints in front of it (several small sidecar images exist for
      # exactly this) rather than relying on this flag alone.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Read-only: point this at wherever Dockge stores your stack compose files.
      - /opt/stacks:/compose:ro
      # Read-write: SQLite database of detected updates and generated notes.
      - service-sentinel-data:/data
      # Read-write, root-only: entrypoint.sh runs as root before dropping to appuser, and remaps
      # appuser to PUID/PGID plus (if the socket's group differs) adds it to a matching group so
      # appuser can reach the docker socket -- both write to /etc/passwd, /etc/group, etc. Under
      # read_only above, the image's own baked /etc would otherwise be unwritable at every
      # startup. A named volume here gets Docker's normal "copy the image's existing content in
      # on first use" behavior, so appuser/root still exist on first boot, and every entrypoint
      # run after that persists into the same volume exactly like /data already does. This has
      # no bearing on what the *app process* itself (appuser, the real attack surface) can
      # write -- /etc stays root-owned and non-writable by appuser either way, same as today.
      - service-sentinel-etc:/etc

volumes:
  service-sentinel-data:
  service-sentinel-etc:
